services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: buddy
      POSTGRES_PASSWORD: buddy
      POSTGRES_DB: buddy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U buddy"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: buddy
      DB_PASSWORD: buddy
      DB_NAME: buddy
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      BASE_URL: ${BASE_URL:-http://localhost:5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./front_end
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
